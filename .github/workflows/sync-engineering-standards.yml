name: Sync Engineering Standards

on:
  workflow_dispatch:
    inputs:
      standards_ref:
        description: "Branch or tag from engineering standards repo"
        required: false
        default: "main"
  schedule:
    - cron: "0 9 * * 1" # every Monday 09:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync engineering standards
        env:
          STANDARDS_REPO: Eleven-Brands/eleven-brands-engineering-standards
          STANDARDS_REF: ${{ inputs.standards_ref || 'main' }}
          GITHUB_TOKEN: ${{ secrets.STANDARDS_REPO_TOKEN }}
        run: |
          bash scripts/sync_engineering_standards.sh

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-engineering-standards
          delete-branch: true
          title: "chore: sync engineering standards"
          commit-message: "chore: sync engineering standards"
          body: |
            This PR syncs shared engineering standards files from:
            - Eleven-Brands/eleven-brands-engineering-standards @ `${{ inputs.standards_ref || 'main' }}`

            Synced items:
            - CODE_OF_CONDUCT.md
            - CONTRIBUTING.md
            - LICENSE
            - setup_gcp.md
            - setup_local_development.md
            - .github (enforced from standards repo)
          labels: |
            automation
            docs
